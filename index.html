<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>GameSpace Galaxy</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 12px 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .login { background: #3b82f6; color: white; }
    .pay { background: #22c55e; color: white; }
  </style>
</head>

<body>

<h2>🎮 GameSpace Galaxy</h2>

<button class="login" onclick="login()">Login with Pi</button>
<br/>

<button class="pay" onclick="pay()">Pay 0.001 π</button>

<script>
let user = null;

window.onload = function () {
  Pi.init({ version: "2.0", sandbox: true });
};

async function login() {
  try {
    const scopes = ['payments'];
    user = await Pi.authenticate(scopes);
    alert("✅ Logged in: " + user.user.username);
  } catch (e) {
    console.log(e);
    alert("❌ Login failed");
  }
}

function pay() {
  if (!user) {
    alert("❌ خاصك Login الأول");
    return;
  }

  Pi.createPayment(
    {
      amount: 0.001,
      memo: "GameSpace Galaxy Test Payment",
      metadata: { app: "GameSpace Galaxy" }
    },
    {
      onReadyForServerApproval: function(paymentId) {
        fetch("/api/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId })
        });
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        fetch("/api/complete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId, txid })
        });

        alert("🎉 Payment Successful");
      },

      onCancel: () => alert("Cancelled"),
      onError: (e) => alert("Error: " + e)
    }
  );
}
</script>

</body>
</html>
