<button onclick="login()" style="padding:10px;margin-bottom:20px;">
Login with Pi
</button>

<button onclick="pay()" style="padding:15px;background:#22c55e;border:none;border-radius:10px;">
Pay 0.001 π
</button>

<script>
let user = null;

window.onload = function () {
  Pi.init({ version: "2.0", sandbox: true });
};

async function login() {
  try {
    user = await Pi.authenticate(['payments']);
    alert("✅ Logged in: " + user.user.username);
  } catch (e) {
    alert("Login failed");
  }
}

function pay() {
  if (!user) {
    alert("❌ خاصك تدير Login الأول");
    return;
  }

  Pi.createPayment(
    {
      amount: 0.001,
      memo: "GameSpace Galaxy Test Payment",
      metadata: { app: "GameSpace Galaxy" }
    },
    {
      onReadyForServerApproval: function(paymentId) {
        console.log("Approve:", paymentId);
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        alert("🎉 Payment Success");
      },
      onCancel: function() {
        alert("❌ Cancelled");
      },
      onError: function(e) {
        alert("Error: " + e);
      }
    }
  );
}
</script>
